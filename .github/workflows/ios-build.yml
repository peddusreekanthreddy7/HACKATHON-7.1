name: iOS Build (compile check)

# Proves the iOS target COMPILES on a real macOS toolchain without anyone
# owning a Mac. Builds for the iOS Simulator with code signing disabled, so no
# Apple developer account / certificates are needed. A green run = evidence the
# cross-platform React Native app builds for iOS 15.1+.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  ios-compile:
    # macos-15 ships Xcode 16.x — React Native 0.85 requires Xcode >= 16.1.
    runs-on: macos-15
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode >= 16.1 (RN 0.85 requirement)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: CocoaPods install
        working-directory: ios
        run: pod install

      - name: Xcodebuild (iOS Simulator, no signing)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace DatalakeFaceAuth.xcworkspace \
            -scheme DatalakeFaceAuth \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build
