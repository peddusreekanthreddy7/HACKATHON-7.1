name: Android APK (standalone release)

# Builds a SIGNED, STANDALONE release APK on GitHub's Ubuntu runners (no local
# toolchain needed). Release uses the committed debug keystore (RN template
# default) so the APK installs + runs WITHOUT Metro/a laptop — JS is bundled in.
# Download it from the run's "Artifacts" section and sideload to any phone.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install required Android SDK components (SDK 36 + NDK)
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973" >/dev/null 2>&1 || true

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DatalakeFaceAuth-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
